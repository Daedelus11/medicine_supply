<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Ava's Meds</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22%23d4af37%22 font-family=%22serif%22 font-weight=%22bold%22>A</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at center, #1a2a3a 0%, #050a0f 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; /* Prevents unwanted scrolling */
        }
        .gear { position: absolute; z-index: -1; opacity: 0.1; animation: rotate 80s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* DYNAMIC RESIZING CONTAINER */
        .artifact-card {
            background: linear-gradient(180deg, rgba(40, 55, 75, 0.9) 0%, rgba(15, 20, 30, 0.95) 100%);
            backdrop-filter: blur(25px);
            border: 2px solid #d4af37;
            box-shadow: 0 0 60px rgba(0, 0, 0, 1), inset 0 0 30px rgba(212, 175, 55, 0.2);
            position: relative;
            max-height: 90vh; /* Scaling Fix */
            width: 90vw;
            max-width: 400px;
        }

        /* 5-STAR RARITY SLOT */
        .rarity-slot {
            background: linear-gradient(180deg, #d29762 0%, #7d5a3c 100%);
            border: 2px solid #f3e5ab;
            box-shadow: 0 0 15px rgba(210, 151, 98, 0.5);
            width: 80px; height: 80px;
            border-bottom-right-radius: 18px;
        }

        .chiseled-text { font-family: 'Cinzel', serif; text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

        /* BUTTONS: Dark by default, Light on Activation */
        .action-orb {
            width: 78px; height: 78px; /* 15% larger than standard */
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(212, 175, 55, 0.3);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s ease;
            color: rgba(212, 175, 55, 0.4);
        }
        .action-orb:active {
            background: #d4af37; /* Light up on activation */
            color: #0c1219;
            box-shadow: 0 0 40px #d4af37;
            transform: scale(0.92);
        }

        /* ORNATE CORNERS */
        .corner { position: absolute; width: 35px; height: 35px; border: 4px solid #d4af37; }
        .tc { top: -12px; left: -12px; border-right: 0; border-bottom: 0; }
        .bc { bottom: -12px; right: -12px; border-left: 0; border-top: 0; }
        .star { color: #f3e5ab; text-shadow: 0 0 5px #d4af37; font-size: 12px; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen">
    <svg class="gear" style="top: -10%; right: -10%; width: 500px;" viewBox="0 0 100 100">
        <path fill="#d4af37" d="M95,50c0-2.2-1.4-4-3.4-4.8l-4.5-1.8c-0.6-1.9-1.4-3.7-2.5-5.4l2.5-4.2c1.1-1.9,0.7-4.3-1-5.8L78,21c-1.6-1.4-4-1.2-5.4,0.6l-3.2,4.1c-1.8-0.9-3.7-1.6-5.7-2.1l-0.8-4.8c-0.4-2.1-2.2-3.7-4.3-3.7H51.4c-2.1,0-4,1.6-4.3,3.7l-0.8,4.8c-2,0.5-3.9,1.2-5.7,2.1l-3.2-4.1c-1.4-1.8-3.8-2-5.4-0.6L22,28.1c-1.7,1.5-2.1,3.9-1,5.8l2.5,4.2c-1.1,1.7-1.9,3.5-2.5,5.4l-4.5,1.8c-2,0.8-3.4,2.6-3.4,4.8v10c0,2.2,1.4,4,3.4,4.8l4.5,1.8c0.6,1.9,1.4,3.7,2.5,5.4l-2.5,4.2c-1.1,1.9-0.7,4.3,1,5.8L32,79c1.6,1.4,4,1.2,5.4-0.6l3.2-4.1c1.8,0.9,3.7,1.6,5.7,2.1l0.8,4.8c0.4,2.1,2.2,3.7,4.3,3.7h17.1c2.1,0,4-1.6,4.3-3.7l0.8-4.8c2-0.5,3.9-1.2,5.7-2.1l3.2,4.1c1.4,1.8,3.8,2,5.4,0.6L88,71.9c1.7-1.5,2.1-3.9,1-5.8l-2.5-4.2c1.1-1.7,1.9-3.5,2.5-5.4l4.5-1.8c2-0.8,3.4-2.6,3.4-4.8V50z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/>
    </svg>

    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabaseUrl = 'https://mrhgitbdobfnelnulnbg.supabase.co';
        const supabaseKey = 'sb_publishable_IaM9WgZS8_juRrtHTZBFMQ_BUgc3-uh';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const ArtifactIcon = ({ color }) => (
            <svg width="50" height="50" viewBox="0 0 100 100">
                <path d="M40,15 L60,15 L60,75 L40,75 Z" fill="rgba(0,0,0,0.8)" stroke="#f3e5ab" strokeWidth="2" />
                <rect x="43" y="35" width="14" height="30" rx="2" fill={color} className="animate-pulse" />
                <path d="M38,20 L62,20 L62,28 L38,28 Z" fill="#d4af37" />
                <circle cx="50" cy="82" r="6" fill="#f3e5ab" />
            </svg>
        );

        function App() {
            const [count, setCount] = useState(0);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            const isLowSupply = count <= 2;

            const fetchData = async () => {
                const { data: c } = await supabaseClient.from('medicine_supply').select('value').eq('label', 'cartridge_count').single();
                const { data: h } = await supabaseClient.from('medicine_log').select('timestamp, change_type').order('timestamp', { ascending: false }).limit(3);
                if (c) setCount(c.value);
                if (h) setHistory(h);
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
                const channel = supabaseClient.channel('realtime').on('postgres_changes', { event: '*', schema: 'public' }, () => fetchData()).subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, []);

            const updateCount = async (newVal) => {
                const v = newVal < 0 ? 0 : newVal;
                setCount(v);
                await supabaseClient.from('medicine_supply').update({ value: v }).eq('label', 'cartridge_count');
                await supabaseClient.from('medicine_log').insert([{ change_type: v > count ? 'RESTOCK' : 'CONSUMED', timestamp: new Date().toISOString() }]);
            };

            if (loading) return <div className="chiseled-text tracking-widest text-yellow-600/50">SYNCHRONIZING...</div>;

            return (
                <div className={`artifact-card p-6 md:p-10 rounded-2xl text-center transition-all flex flex-col justify-between ${isLowSupply ? 'border-red-500 shadow-[0_0_80px_rgba(239,68,68,0.6)]' : ''}`}>
                    <div className="corner tc"></div><div className="corner bc"></div>

                    {/* ITEM SECTION */}
                    <div className="flex flex-col items-center">
                        <div className="rarity-slot flex items-center justify-center">
                            <ArtifactIcon color={isLowSupply ? "#ef4444" : "#60a5fa"} />
                        </div>
                        <div className="flex gap-1 mt-2">
                            {[...Array(5)].map((_, i) => <span key={i} className="star">★</span>)}
                        </div>
                    </div>

                    <h1 className="chiseled-text text-[10px] uppercase tracking-[0.3em] mt-4 text-yellow-600/50 font-bold">Supply Inventory</h1>
                    
                    <div className={`chiseled-text text-[20vh] font-black leading-none tabular-nums my-4 ${isLowSupply ? 'text-red-500 drop-shadow-[0_0_20px_#ef4444]' : 'text-white'}`}>
                        {count}
                    </div>
                    
                    <div className="flex justify-center gap-10">
                        <button onClick={() => updateCount(count - 1)} className="action-orb text-3xl font-light"><span>−</span></button>
                        <button onClick={() => updateCount(count + 1)} className="action-orb text-4xl font-bold"><span>+</span></button>
                    </div>

                    {isLowSupply && (
                        <div className="mt-6 text-[12px] uppercase tracking-[0.2em] text-red-500 font-black animate-bounce chiseled-text">
                            Ava Wagner Needs her Meds!!!
                        }
                    </div>)}

                    {/* LOG SECTION */}
                    <div className="mt-6 pt-4 border-t border-yellow-600/10 text-left bg-black/20 rounded-b-xl px-4 overflow-hidden">
                        <h2 className="chiseled-text text-[8px] uppercase tracking-[0.2em] text-yellow-600/30 font-bold mb-2 text-center italic">Recent Chronicles</h2>
                        {history.map((l, i) => (
                            <div key={i} className="flex justify-between py-1 border-b border-white/5 chiseled-text text-[9px] text-yellow-600/60">
                                <span>{l.change_type}</span>
                                <span>{new Date(l.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
