<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Log: Fontaine Chronicles</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            /* Background: Parchment Texture/Radial Gradient */
            background: radial-gradient(circle at center, #232c3e 0%, #10151f 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* Moving Gears Background */
        .gear {
            position: absolute;
            z-index: -1;
            opacity: 0.05;
            animation: rotate 60s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* The Main Ornate "Genshin" Container */
        .fontaine-card {
            background: rgba(31, 40, 56, 0.6);
            backdrop-filter: blur(12px);
            /* Double-pinstripe gold border */
            border: 2px solid #d4af37;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(212, 175, 55, 0.3);
            position: relative;
        }

        /* Ornate Gold Corner Brackets */
        .fontaine-card::before, .fontaine-card::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 3px solid #d4af37;
        }
        .fontaine-card::before { top: -6px; left: -6px; border-right: 0; border-bottom: 0; }
        .fontaine-card::after { bottom: -6px; right: -6px; border-left: 0; border-top: 0; }

        /* Stylized "Genshin-style" orbs for buttons */
        .hydro-orb {
            border: 3px solid #3b82f6;
            background: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transition: all 0.2s;
        }
        .hydro-orb:hover { background: rgba(59, 130, 246, 0.4); box-shadow: 0 0 25px rgba(59, 130, 246, 0.7); }

        .pyro-orb {
            border: 3px solid #ef4444;
            background: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            transition: all 0.2s;
        }
        .pyro-orb:hover { background: rgba(239, 68, 68, 0.4); box-shadow: 0 0 25px rgba(239, 68, 68, 0.7); }

        /* Stylized Font for Counter and Header */
        .chiseled-text {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .history-item {
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 0.1em;
            color: rgba(191, 219, 254, 0.6);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding: 4px 0;
        }
    </style>
</head>
<body class="text-white">
    <svg class="gear" style="top: -10%; right: -10%; width: 500px;" viewBox="0 0 100 100">
        <path fill="#d4af37" d="M95,50c0-2.2-1.4-4-3.4-4.8l-4.5-1.8c-0.6-1.9-1.4-3.7-2.5-5.4l2.5-4.2c1.1-1.9,0.7-4.3-1-5.8L78,21c-1.6-1.4-4-1.2-5.4,0.6l-3.2,4.1c-1.8-0.9-3.7-1.6-5.7-2.1l-0.8-4.8c-0.4-2.1-2.2-3.7-4.3-3.7H51.4c-2.1,0-4,1.6-4.3,3.7l-0.8,4.8c-2,0.5-3.9,1.2-5.7,2.1l-3.2-4.1c-1.4-1.8-3.8-2-5.4-0.6L22,28.1c-1.7,1.5-2.1,3.9-1,5.8l2.5,4.2c-1.1,1.7-1.9,3.5-2.5,5.4l-4.5,1.8c-2,0.8-3.4,2.6-3.4,4.8v10c0,2.2,1.4,4,3.4,4.8l4.5,1.8c0.6,1.9,1.4,3.7,2.5,5.4l-2.5,4.2c-1.1,1.9-0.7,4.3,1,5.8L32,79c1.6,1.4,4,1.2,5.4-0.6l3.2-4.1c1.8,0.9,3.7,1.6,5.7,2.1l0.8,4.8c0.4,2.1,2.2,3.7,4.3,3.7h17.1c2.1,0,4-1.6,4.3-3.7l0.8-4.8c2-0.5,3.9-1.2,5.7-2.1l3.2,4.1c1.4,1.8,3.8,2,5.4,0.6L88,71.9c1.7-1.5,2.1-3.9,1-5.8l-2.5-4.2c1.1-1.7,1.9-3.5,2.5-5.4l4.5-1.8c2-0.8,3.4-2.6,3.4-4.8V50z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/>
    </svg>

    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://mrhgitbdobfnelnulnbg.supabase.co';
        const supabaseKey = 'sb_publishable_IaM9WgZS8_juRrtHTZBFMQ_BUgc3-uh';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function App() {
            const [count, setCount] = useState(0);
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            // "Low Supply" threshold is 2
            const isLowSupply = count <= 2;

            useEffect(() => {
                const fetchData = async () => {
                    const { data: countData } = await supabaseClient.from('medicine_supply').select('value').eq('label', 'cartridge_count').single();
                    const { data: historyData } = await supabaseClient.from('medicine_log').select('timestamp, change_type').order('timestamp', { ascending: false }).limit(3);
                    
                    if (countData) setCount(countData.value);
                    if (historyData) setHistory(historyData);
                    setLoading(false);
                };
                fetchData();

                const channel = supabaseClient.channel('db-changes').on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'medicine_supply' },
                    () => fetchData()
                ).subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, []);

            const updateCount = async (newVal) => {
                const validatedVal = newVal < 0 ? 0 : newVal;
                const changeType = newVal > count ? 'RESTOCK' : 'CONSUMED';
                
                setCount(validatedVal);
                
                await supabaseClient.from('medicine_supply').update({ value: validatedVal }).eq('label', 'cartridge_count');
                await supabaseClient.from('medicine_log').insert([{ change_type: changeType, timestamp: new Date().toISOString() }]);
            };

            if (loading) return <div className="flex h-screen items-center justify-center chiseled-text tracking-widest text-blue-200">LOADING DATA...</div>;

            return (
                <div className={`flex h-screen items-center justify-center p-6 transition-all duration-1000 ${isLowSupply ? 'bg-red-950/40' : ''}`}>
                    
                    <div className={`fontaine-card w-full max-w-sm p-8 rounded-xl text-center transition-all duration-1000 ${isLowSupply ? 'shadow-[0_0_40px_rgba(239,68,68,0.7)] border-red-500' : 'shadow-[0_0_15px_rgba(59,130,246,0.5)]'}`}>
                        
                        <div className="flex justify-center mb-6">
                             <div className={`h-1 w-12 rounded-full ${isLowSupply ? 'bg-red-500 animate-pulse' : 'bg-blue-400 shadow-[0_0_10px_#60a5fa]'}`}></div>
                        </div>

                        <h1 className="chiseled-text text-[11px] uppercase tracking-[0.4em] mb-12 text-blue-200/70 font-bold">
                            CARTRIDGE SUPPLY LOG
                        </h1>
                        
                        <div className={`chiseled-text text-9xl font-black mb-16 tabular-nums transition-colors duration-1000 ${isLowSupply ? 'text-red-400 shadow-[0_0_20px_#ef4444]' : 'text-white'}`}>
                            {count}
                        </div>
                        
                        <div className="flex justify-center gap-10 mb-10 px-4">
                            <button onClick={() => updateCount(count - 1)} className="w-16 h-16 rounded-full border border-blue-400/30 flex items-center justify-center text-3xl hover:bg-white/5 active:scale-90 transition-all text-blue-200"><span>−</span></button>
                            
                            <button onClick={() => updateCount(count + 1)} className="w-16 h-16 rounded-full hydro-orb flex items-center justify-center text-3xl font-bold active:scale-90 transition-all shadow-lg text-white"><span>+</span></button>
                        </div>

                        {isLowSupply && (
                            <div className="mb-8 text-xs uppercase tracking-[0.2em] text-red-400 font-black animate-bounce chiseled-text">
                                Ava Wagner Needs her Med's!!
                            </div>
                        )}

                        <div className="mt-4 pt-4 border-t border-blue-400/10 text-left">
                            <h2 className="chiseled-text text-[8px] uppercase tracking-[0.3em] text-blue-200/40 font-bold mb-3">Recent Chronicles</h2>
                            {history.map((log, i) => (
                                <div key={i} className="history-item flex justify-between">
                                    <span>{log.change_type}</span>
                                    <span>{new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
