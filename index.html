    <style>
        /* Theme Configuration */
        .theme-fontaine { --realm-glow: rgba(0, 150, 255, 0.5); --realm-bg: #111b27; --accent: #60a5fa; }
        .theme-liyue { --realm-glow: rgba(255, 200, 0, 0.4); --realm-bg: #221a0f; --accent: #fbbf24; }
        .theme-inazuma { --realm-glow: rgba(180, 0, 255, 0.4); --realm-bg: #1a1025; --accent: #a855f7; }

        body {
            background: var(--realm-bg);
            transition: background 1.2s ease;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .gear { 
            position: absolute; z-index: -1; opacity: 0.15; 
            animation: rotate 120s linear infinite; pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .artifact-card {
            background: linear-gradient(180deg, rgba(30, 45, 65, 0.98) 0%, rgba(10, 15, 20, 1) 100%);
            border: 2px solid #d4af37;
            box-shadow: 0 0 100px var(--realm-glow), inset 0 0 40px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        /* Two Corner Geometry */
        .corner { position: absolute; width: 45px; height: 45px; border: 5px solid #d4af37; z-index: 10; }
        .tc_l { top: -14px; left: -14px; border-right: 0; border-bottom: 0; }
        .bc_r { bottom: -14px; right: -14px; border-left: 0; border-top: 0; }

        /* Large Tactile Buttons */
        .action-orb {
            background: linear-gradient(180deg, #5c4033 0%, #2b1d0e 100%); 
            border: 5px solid #f9f0d1; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.9);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .action-orb:active { transform: scale(0.9); box-shadow: 0 0 50px #f9f0d1; background: #f9f0d1; color: #2b1d0e; }

        .chiseled-text { font-family: 'Cinzel', serif; }

        .indicator-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(212, 175, 55, 0.2); transition: all 0.4s; }
        .indicator-dot.active { background: #d4af37; transform: scale(1.4); box-shadow: 0 0 15px #d4af37; }
    </style>
</head>
