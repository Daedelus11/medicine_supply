<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Ava's Meds</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22%23d4af37%22 font-family=%22serif%22 font-weight=%22bold%22>A</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* Multi-Realm Variables */
        .theme-fontaine { --realm-glow: rgba(0, 150, 255, 0.5); --realm-bg: #111b27; }
        .theme-liyue { --realm-glow: rgba(255, 200, 0, 0.4); --realm-bg: #221a0f; }
        .theme-inazuma { --realm-glow: rgba(180, 0, 255, 0.4); --realm-bg: #1a1025; }

        body {
            background: var(--realm-bg);
            transition: background 1.2s ease;
            font-family: 'Quicksand', sans-serif;
            margin: 0; overflow: hidden; height: 100vh;
        }

        .gear { 
            position: absolute; z-index: -1; opacity: 0.15; 
            animation: rotate 120s linear infinite; pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .artifact-card {
            background: linear-gradient(180deg, rgba(30, 45, 65, 0.98) 0%, rgba(10, 15, 20, 1) 100%);
            border: 2px solid #d4af37;
            box-shadow: 0 0 100px var(--realm-glow), inset 0 0 40px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        /* Two Corner Geometry */
        .corner { position: absolute; width: 45px; height: 45px; border: 5px solid #d4af37; z-index: 10; }
        .tc_l { top: -14px; left: -14px; border-right: 0; border-bottom: 0; }
        .bc_r { bottom: -14px; right: -14px; border-left: 0; border-top: 0; }

        /* Tactile Button Materials */
        .action-orb {
            background: linear-gradient(180deg, #5c4033 0%, #2b1d0e 100%); 
            border: 5px solid #f9f0d1; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.9);
            transition: transform 0.1s ease, background 0.1s;
        }
        .action-orb:active { transform: scale(0.9); background: #f9f0d1; color: #2b1d0e; box-shadow: 0 0 50px #f9f0d1; }

        .chiseled-text { font-family: 'Cinzel', serif; text-shadow: 0 0 20px rgba(0,0,0,0.8); }

        .indicator-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(212, 175, 55, 0.2); transition: all 0.4s; }
        .indicator-dot.active { background: #d4af37; transform: scale(1.4); box-shadow: 0 0 15px #d4af37; }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const supabaseUrl = 'https://mrhgitbdobfnelnulnbg.supabase.co';
        const supabaseKey = 'sb_publishable_IaM9WgZS8_juRrtHTZBFMQ_BUgc3-uh';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const REALMS = [
            { id: 'Lime', name: 'BELLEAU', theme: 'theme-liyue', accent: '#fbbf24' },
            { id: 'Ava', name: 'FONTAINE', theme: 'theme-fontaine', accent: '#60a5fa' },
            { id: 'Ash', name: 'BERYL', theme: 'theme-inazuma', accent: '#a855f7' }
        ];

        const ArtifactScreen = ({ realm, onSwipe }) => {
            const [count, setCount] = useState(0);
            const [history, setHistory] = useState([]);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);
            const isLowSupply = count <= 2;

            const fetchData = async () => {
                const { data: c } = await supabaseClient.from('medicine_supply').select('value').eq('label', realm.id).single();
                const { data: h } = await supabaseClient.from('medicine_log').select('timestamp, change_type').eq('supply_type', realm.id).order('timestamp', { ascending: false }).limit(3);
                if (c) setCount(c.value);
                if (h) setHistory(h);
            };

            useEffect(() => {
                fetchData();
                const channel = supabaseClient.channel(`realtime-${realm.id}`).on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'medicine_supply', filter: `label=eq.${realm.id}` }, () => fetchData()
                ).subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, [realm.id]);

            const updateCount = async (newVal) => {
                const v = newVal < 0 ? 0 : newVal;
                setCount(v); // Instant response logic
                await supabaseClient.from('medicine_supply').update({ value: v }).eq('label', realm.id);
                await supabaseClient.from('medicine_log').insert([{ 
                    supply_type: realm.id, 
                    change_type: v > count ? 'RESTOCK' : 'CONSUMED', 
                    timestamp: new Date().toISOString() 
                }]);
            };

            const handleTouchStart = (e) => setTouchStart(e.targetTouches[0].clientX);
            const handleTouchMove = (e) => setTouchEnd(e.targetTouches[0].clientX);
            const handleTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                if (distance > 70) onSwipe(1);
                if (distance < -70) onSwipe(-1);
                setTouchStart(null); setTouchEnd(null);
            };

            return (
                <div onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} className="w-full flex flex-col items-center justify-center">
                    <div className={`artifact-card w-[90vw] max-w-sm h-[75vh] p-8 rounded-2xl text-center flex flex-col justify-between transition-all ${isLowSupply ? 'border-red-500 shadow-[0_0_80px_rgba(239,68,68,0.7)]' : ''}`}>
                        <div className="corner tc_l"></div><div className="corner bc_r"></div>

                        <div className="flex flex-col items-center">
                            <div className="rarity-slot bg-gradient-to-b from-[#d29762] to-[#7d5a3c] border-2 border-[#f9f0d1] w-20 h-20 rounded-br-2xl flex items-center justify-center shadow-lg">
                                {/* MAXIMIZED ORIGINAL ICON */}
                                <svg width="67" height="67" viewBox="0 0 100 100">
                                    <path d="M40,15 L60,15 L60,75 L40,75 Z" fill="rgba(0,0,0,0.8)" stroke="#f3e5ab" strokeWidth="2" />
                                    <rect x="43" y="35" width="14" height="30" rx="2" fill={isLowSupply ? "#ef4444" : realm.accent} className="animate-pulse" />
                                    <path d="M38,20 L62,20 L62,28 L38,28 Z" fill="#d4af37" /><circle cx="50" cy="82" r="6" fill="#f3e5ab" />
                                </svg>
                            </div>
                            <div className="flex gap-1 mt-2 text-[#f3e5ab] text-sm">★ ★ ★ ★ ★</div>
                        </div>

                        <h1 className="chiseled-text uppercase tracking-[0.6em] text-[#d4af37] font-black text-sm mt-4">LEGENDARY SUPPLY</h1>
                        <div className="chiseled-text uppercase tracking-widest text-[#d4af37] text-xs opacity-60 font-bold">{realm.name} REALM</div>

                        <div className={`chiseled-text text-[13vh] font-black leading-none tabular-nums my-4 ${isLowSupply ? 'text-red-500' : 'text-white'}`}>{count}</div>
                        
                        <div className="flex justify-center gap-10">
                            <button onClick={() => updateCount(count - 1)} className="action-orb w-20 h-20 rounded-full text-4xl font-light">−</button>
                            <button onClick={() => updateCount(count + 1)} className="action-orb w-20 h-20 rounded-full text-5xl font-bold">+</button>
                        </div>

                        {isLowSupply && realm.id === 'Ava' && (
                            <div className="mt-4 text-[18.5px] text-red-500 font-black animate-bounce chiseled-text drop-shadow-[0_0_10px_black]">
                                Ava Wagner Needs her Meds!!!
                            </div>
                        )}

                        {/* RESTORED CHRONICLES */}
                        <div className="mt-4 pt-4 border-t border-yellow-600/20 text-left bg-black/40 rounded-b-xl px-4 overflow-hidden">
                            <h2 className="chiseled-text text-[8px] uppercase tracking-[0.3em] text-yellow-600/40 font-bold mb-2 text-center italic">Recent Chronicles</h2>
                            {history.map((l, i) => (
                                <div key={i} className="flex justify-between py-1 border-b border-white/5 chiseled-text text-[10px] text-yellow-600/80 font-bold uppercase">
                                    <span>{l.change_type}</span>
                                    <span>{new Date(l.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentIdx, setCurrentIdx] = useState(1);

            useEffect(() => {
                document.body.className = REALMS[currentIdx].theme;
            }, [currentIdx]);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <svg className="gear" style={{ top: '-10%', right: '-10%', width: '750px' }} viewBox="0 0 100 100">
                        <path fill="#d4af37" d="M95,50c0-2.2-1.4-4-3.4-4.8l-4.5-1.8c-0.6-1.9-1.4-3.7-2.5-5.4l2.5-4.2c1.1-1.9,0.7-4.3-1-5.8L78,21c-1.6-1.4-4-1.2-5.4,0.6l-3.2,4.1c-1.8-0.9-3.7-1.6-5.7-2.1l-0.8-4.8c-0.4-2.1-2.2-3.7-4.3-3.7H51.4c-2.1,0-4,1.6-4.3,3.7l-0.8,4.8c-2,0.5-3.9,1.2-5.7,2.1l-3.2-4.1c-1.4-1.8-3.8-2-5.4-0.6L22,28.1c-1.7,1.5-2.1,3.9-1,5.8l2.5,4.2c-1.1,1.7-1.9,3.5-2.5,5.4l-4.5,1.8c-2,0.8-3.4,2.6-3.4,4.8v10c0,2.2,1.4,4,3.4,4.8l4.5,1.8c0.6,1.9,1.4,3.7,2.5,5.4l-2.5,4.2c-1.1,1.9-0.7,4.3,1,5.8L32,79c1.6,1.4,4,1.2,5.4-0.6l3.2-4.1c1.8,0.9,3.7,1.6,5.7,2.1l0.8,4.8c0.4,2.1,2.2,3.7,4.3,3.7h17.1c2.1,0,4-1.6,4.3-3.7l0.8-4.8c2-0.5,3.9-1.2,5.7-2.1l3.2,4.1c1.4,1.8,3.8,2,5.4,0.6L88,71.9c1.7-1.5,2.1-3.9,1-5.8l-2.5-4.2c1.1-1.7,1.9-3.5,2.5-5.4l4.5-1.8c2-0.8,3.4-2.6,3.4-4.8V50z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/>
                    </svg>
                    <ArtifactScreen realm={REALMS[currentIdx]} onSwipe={(dir) => {
                        const n = currentIdx + dir;
                        if (n >= 0 && n < REALMS.length) setCurrentIdx(n);
                    }} />
                    <div className="flex gap-6 mt-10">
                        {REALMS.map((r, idx) => (
                            <div key={idx} className="flex flex-col items-center gap-1">
                                <div className={`indicator-dot ${currentIdx === idx ? 'active' : ''}`} />
                                <span className={`chiseled-text text-[8px] font-black ${currentIdx === idx ? 'text-[#d4af37]' : 'text-yellow-600/20'}`}>{r.id}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
