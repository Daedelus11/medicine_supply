<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0b">
    
    <title>Supply Log</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' x='20' font-family='Georgia, serif' font-size='85' font-weight='bold' fill='%23d4af37'>A</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' x='20' font-family='Georgia, serif' font-size='85' font-weight='bold' fill='%23d4af37'>A</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
            background: #000;
            overscroll-behavior-y: contain;
            color: white;
            user-select: none;
        }
        .cinzel { font-family: 'Cinzel', serif; }
        
        /* Artifact Card & Styling */
        .artifact-card {
            position: relative;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
        }
        .corner-gold {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 3px solid #d4af37;
        }
        .top-left { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* Icon Animations */
        @keyframes pulse-normal {
            0%, 100% { filter: drop-shadow(0 0 8px var(--realm-color)); transform: scale(1.1); }
            50% { filter: drop-shadow(0 0 18px var(--realm-color)); transform: scale(1.2); }
        }
        @keyframes flash-pyro {
            0%, 100% { filter: drop-shadow(0 0 10px #ef4444); transform: scale(1.15); color: #ef4444; }
            50% { filter: drop-shadow(0 0 25px #dc2626); transform: scale(1.3); color: #f87171; }
        }
        
        .icon-state-normal { animation: pulse-normal 3s infinite ease-in-out; }
        .icon-state-critical { animation: flash-pyro 0.8s infinite ease-in-out; }
        
        @keyframes bounce-alert {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .bounce { animation: bounce-alert 1s infinite; }

        /* Action Buttons */
        .action-orb {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 5px solid #fdf5e6;
            background: linear-gradient(145deg, #5d4037, #3e2723);
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .action-orb:active { transform: scale(0.9); box-shadow: 0 5px 10px rgba(0,0,0,0.5); }

        /* Custom Scrollbar for logs */
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="bg-0" class="fixed inset-0 bg-[radial-gradient(circle_at_top,_#451a03,_#000)] opacity-0 transition-opacity duration-700 -z-10"></div>
    <div id="bg-1" class="fixed inset-0 bg-[radial-gradient(circle_at_top,_#082f49,_#000)] opacity-100 transition-opacity duration-700 -z-10"></div>
    <div id="bg-2" class="fixed inset-0 bg-[radial-gradient(circle_at_top,_#3b0764,_#000)] opacity-0 transition-opacity duration-700 -z-10"></div>

    <div id="app-container" class="h-screen w-full flex flex-col items-center justify-center relative">
        
        <div id="card" class="artifact-card w-11/12 max-w-md p-8 rounded-sm relative flex flex-col items-center">
            <div class="corner-gold top-left"></div>
            <div class="corner-gold bottom-right"></div>

            <h2 class="cinzel text-yellow-500 font-bold uppercase mb-6 text-center w-full" style="letter-spacing: 0.4em; font-size: 1.1rem;">
                LEGENDARY SUPPLY
            </h2>

            <div id="icon-container" class="w-20 h-20 mb-4 flex items-center justify-center transition-colors duration-500">
                <svg viewBox="0 0 24 24" class="w-full h-full fill-current">
                    <path d="M17 2H7C5.9 2 5 2.9 5 4V20C5 21.1 5.9 22 7 22H17C18.1 22 19 21.1 19 20V4C19 2.9 18.1 2 17 2M15 20H9V17H15V20M17 15H7V6H17V15M13 8H11V10H9V12H11V14H13V12H15V10H13V8Z" />
                </svg>
            </div>

            <div id="count-display" class="cinzel font-black leading-none mb-2" style="font-size: 13vh;">
                -
            </div>

            <div id="alert-msg" class="text-red-500 font-bold bounce h-6 mb-4" style="font-size: 18.5px; opacity: 0;">
                Ava Wagner Needs her Meds!!!
            </div>

            <div class="flex justify-between w-full px-2 mb-8 mt-2">
                <button class="action-orb" onclick="updateCount(-1)">-</button>
                <button class="action-orb" onclick="updateCount(1)">+</button>
            </div>

            <div class="w-full border-t border-gray-700 pt-4">
                <p class="cinzel text-xs text-gray-400 mb-3 tracking-widest uppercase">Recent Chronicles</p>
                <div id="log-list" class="space-y-3 log-container max-h-24 overflow-y-auto pr-2">
                    </div>
            </div>
        </div>

        <div class="flex space-x-8 mt-10 z-10 cinzel text-sm font-bold tracking-widest">
            <div id="tab-0" class="cursor-pointer transition-all duration-300 opacity-50 flex flex-col items-center" onclick="setRealm(0)">
                <span class="mb-1">LIME</span>
                <div class="w-2 h-2 rounded-full bg-yellow-500 indicator hidden"></div>
            </div>
            <div id="tab-1" class="cursor-pointer transition-all duration-300 opacity-100 scale-110 flex flex-col items-center" onclick="setRealm(1)">
                <span class="mb-1 text-sky-400">AVA</span>
                <div class="w-2 h-2 rounded-full bg-sky-400 indicator block"></div>
            </div>
            <div id="tab-2" class="cursor-pointer transition-all duration-300 opacity-50 flex flex-col items-center" onclick="setRealm(2)">
                <span class="mb-1">ASH</span>
                <div class="w-2 h-2 rounded-full bg-purple-500 indicator hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Setup ---
        const supabaseUrl = "https://mrhgitbdobfnelnulnbg.supabase.co";
        const supabaseKey = "sb_publishable_IaM9WgZS8_juRrtHTZBFMQ_BUgc3-uh";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- State Management ---
        const REALMS = [
            { id: 'LIME', colorHex: '#eab308', glowShadow: 'rgba(250,204,21,0.3)', textColor: 'text-yellow-500', tabColor: 'text-yellow-500' }, // 0
            { id: 'AVA', colorHex: '#38bdf8', glowShadow: 'rgba(56,189,248,0.3)', textColor: 'text-sky-400', tabColor: 'text-sky-400' }, // 1
            { id: 'ASH', colorHex: '#a855f7', glowShadow: 'rgba(168,85,247,0.3)', textColor: 'text-purple-500', tabColor: 'text-purple-500' } // 2
        ];
        
        let currentIdx = 1; // Default to AVA
        let currentCount = 0;
        let subscription = null;

        // --- DOM Elements ---
        const countDisplay = document.getElementById('count-display');
        const alertMsg = document.getElementById('alert-msg');
        const iconContainer = document.getElementById('icon-container');
        const logList = document.getElementById('log-list');
        const card = document.getElementById('card');

        // --- Core Logic ---
        async function setRealm(index) {
            currentIdx = index;
            const realm = REALMS[currentIdx];

            // 1. Update Backgrounds & Styling
            for(let i = 0; i < 3; i++) {
                document.getElementById(`bg-${i}`).style.opacity = (i === currentIdx) ? '1' : '0';
                
                const tab = document.getElementById(`tab-${i}`);
                const indicator = tab.querySelector('.indicator');
                if (i === currentIdx) {
                    tab.classList.add('opacity-100', 'scale-110', realm.tabColor);
                    tab.classList.remove('opacity-50');
                    indicator.classList.remove('hidden');
                    indicator.classList.add('block');
                } else {
                    tab.className = 'cursor-pointer transition-all duration-300 opacity-50 flex flex-col items-center';
                    indicator.classList.add('hidden');
                    indicator.classList.remove('block');
                }
            }

            // 2. Set Icon Color Variable & Card Glow
            document.documentElement.style.setProperty('--realm-color', realm.colorHex);
            card.style.boxShadow = `0 20px 50px rgba(0,0,0,0.8), 0 0 30px ${realm.glowShadow}`;
            card.style.borderColor = realm.colorHex;

            // 3. Fetch Data & Setup Subscription
            await fetchData();
            setupRealtime();
        }

        async function fetchData() {
            const realmId = REALMS[currentIdx].id;
            
            const { data: supply } = await supabase.from('medicine_supply').select('value').eq('label', realmId).single();
            const { data: logs } = await supabase.from('medicine_log').select('*').eq('supply_type', realmId).order('created_at', { ascending: false }).limit(3);

            if (supply) {
                currentCount = supply.value;
                updateUIVisuals();
            }
            if (logs) renderLogs(logs);
        }

        async function updateCount(delta) {
            const newValue = Math.max(0, currentCount + delta);
            currentCount = newValue;
            updateUIVisuals(); // Optimistic local UI update

            const realmId = REALMS[currentIdx].id;
            await supabase.from('medicine_supply').update({ value: newValue }).eq('label', realmId);
            await supabase.from('medicine_log').insert([{ 
                supply_type: realmId, 
                change_type: delta > 0 ? 'INCREMENT' : 'DECREMENT' 
            }]);
            
            fetchData();
        }

        function updateUIVisuals() {
            countDisplay.innerText = currentCount;
            const realm = REALMS[currentIdx];

            if (currentCount <= 2) {
                alertMsg.style.opacity = '1';
                iconContainer.className = 'w-24 h-24 mb-2 flex items-center justify-center icon-state-critical';
            } else {
                alertMsg.style.opacity = '0';
                iconContainer.className = `w-20 h-20 mb-6 flex items-center justify-center ${realm.textColor} icon-state-normal`;
            }
        }

        function renderLogs(logs) {
            logList.innerHTML = logs.map(log => {
                const time = new Date(log.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const color = log.change_type === 'INCREMENT' ? 'text-green-400' : 'text-red-400';
                return `<div class="flex justify-between text-xs font-semibold tracking-wide">
                            <span class="${color}">${log.change_type}</span>
                            <span class="text-gray-500">${time}</span>
                        </div>`;
            }).join('');
        }

        function setupRealtime() {
            if (subscription) supabase.removeChannel(subscription);
            subscription = supabase.channel('any')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'medicine_supply' }, fetchData)
                .subscribe();
        }

        // --- Swipe Navigation Logic ---
        let touchStartX = 0;
        document.body.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        document.body.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 60) setRealm(Math.min(currentIdx + 1, 2)); // Swipe Left
            if (touchEndX - touchStartX > 60) setRealm(Math.max(currentIdx - 1, 0)); // Swipe Right
        }, { passive: true });

        // Initialize App
        setRealm(1); // Start on AVA
    </script>
</body>
</html>
