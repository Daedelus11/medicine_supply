<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Ava's Meds</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22%23d4af37%22 font-family=%22serif%22 font-weight=%22bold%22>A</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* Multi-Realm Variables */
        .theme-fontaine { --realm-glow: rgba(0, 150, 255, 0.4); --realm-bg: #111b27; }
        .theme-liyue { --realm-glow: rgba(255, 200, 0, 0.3); --realm-bg: #221a0f; }
        .theme-inazuma { --realm-glow: rgba(180, 0, 255, 0.3); --realm-bg: #1a1025; }

        body {
            background: var(--realm-bg);
            transition: background 1s ease;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Standard Kinetics */
        .gear { 
            position: absolute; z-index: -1; opacity: 0.15; 
            animation: rotate 100s linear infinite; pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .artifact-card {
            background: linear-gradient(180deg, rgba(30, 45, 65, 0.98) 0%, rgba(10, 15, 20, 1) 100%);
            border: 2.5px solid #d4af37;
            box-shadow: 0 0 100px var(--realm-glow), inset 0 0 40px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        /* Two Corner layout geometry */
        .corner { position: absolute; width: 45px; height: 45px; border: 5px solid #d4af37; z-index: 10; }
        .tc_l { top: -14px; left: -14px; border-right: 0; border-bottom: 0; }
        .bc_r { bottom: -14px; right: -14px; border-left: 0; border-top: 0; }

        /* Brown Material buttons */
        .action-orb {
            background: linear-gradient(180deg, #5c4033 0%, #2b1d0e 100%); 
            border: 5px solid #f9f0d1; /* Standard thick, bright outline */
            box-shadow: 0 8px 25px rgba(0,0,0,0.9);
            transition: all 0.1s ease;
        }
        .action-orb:active { background: #f9f0d1; color: #2b1d0e; box-shadow: 0 0 50px #f9f0d1; }

        .chiseled-text { font-family: 'Cinzel', serif; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }

        /* Optimized mobile scaling */
        .indicator-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(212, 175, 55, 0.2); transition: all 0.3s; }
        .indicator-dot.active { background: #d4af37; transform: scale(1.3); box-shadow: 0 0 10px #d4af37; }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
